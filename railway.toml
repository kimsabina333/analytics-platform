[build]
dockerfilePath = "webapp/backend/Dockerfile"
buildCommand = ""

[deploy]
startCommand = "uvicorn backend.main:app --host 0.0.0.0 --port $PORT --workers 1 --timeout-keep-alive 120"
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
